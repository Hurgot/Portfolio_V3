<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio BTS SIO - Hugo Boudet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="stars"></div>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">Hugo</div>
                <ul class="nav-menu">
                    <li><a href="#about" class="nav-link">À propos</a></li>
                    <li><a href="#skills" class="nav-link">Compétences</a></li>
                    <li><a href="#projects" class="nav-link">Projets</a></li>
                    <li><a href="#contact" class="nav-link">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section id="hero" class="hero">
            <div class="hero-content">
                <h1 class="hero-title">Hugo Boudet</h1>
                <p class="hero-subtitle">Développeur BTS SIO</p>
                <p class="hero-description">Créateur de solutions web innovantes</p>
            </div>
        </section>
        <section id="about" class="section">
            <div class="section-content">
                <h2 class="section-title"><span class="title-icon">👤</span> À propos de moi</h2>
                <div class="about-container">
                    <p id="about-text" class="about-text"></p>
                </div>
            </div>
        </section>
        <section id="skills" class="section">
            <div class="section-content">
                <h2 class="section-title"><span class="title-icon">⚙️</span> Compétences</h2>
                <div id="skills-list" class="skills-grid"></div>
            </div>
        </section>
        <section id="projects" class="section">
            <div class="section-content">
                <h2 class="section-title"><span class="title-icon">🚀</span> Projets</h2>
                <div id="projects-list" class="projects-grid"></div>
            </div>
        </section>
        <section id="contact" class="section">
            <div class="section-content">
                <h2 class="section-title"><span class="title-icon">📧</span> Contact</h2>
                <div id="contact-info" class="contact-container"></div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <p>&copy; 2026 Hugo Boudet - Portfolio BTS SIO</p>
    </footer>

    <!-- Project Details Modal -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
            </div>
            <div class="modal-body">
                <div class="modal-section">
                    <h3>Captures d'écran</h3>
                    <div class="screenshots-container" id="screenshotsContainer"></div>
                    <label class="upload-btn">
                        <span>📷 Ajouter une capture</span>
                        <input type="file" id="screenshotInput" accept="image/*" style="display: none;">
                    </label>
                </div>
                <div class="modal-section">
                    <h3>Description du projet</h3>
                    <textarea id="projectDescription" placeholder="Écrivez une explication sur ce projet..." rows="6"></textarea>
                    <button class="save-btn" id="saveBtnDescription">Sauvegarder</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Screenshot Lightbox -->
    <div id="screenshotLightbox" class="screenshot-lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close">&times;</button>
            <button class="lightbox-prev">❮</button>
            <img id="lightboxImage" src="" alt="Screenshot en grand">
            <button class="lightbox-next">❯</button>
            <div class="lightbox-counter"><span id="currentSlide">1</span> / <span id="totalSlides">1</span></div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
